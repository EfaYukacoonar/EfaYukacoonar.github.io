<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EfaYukacoonar</title>
  
  <link rel="stylesheet" href="/assets/header/header.css">
  <link rel="stylesheet" href="/css/signup.css">
  
  <link rel="icon" type="image/jpeg" href="/favicon.jpg">
</head>
<body>

  {% include header.html %}

  <main style="margin-top: 80px; padding: 20px;">
    <h1>Efa original</h1>
    <img src="/favicon.jpg" alt="Logo">
  </main>

  <script src="/assets/header/header.js"></script>

  <style>
    .signup {
      color: rgb(0, 0, 50);
      background-color: rgb(50, 0, 0);
      border: 2px solid rgb(0, 50, 0);
      height: 50px;
      width: 150px; /* widgh を width に修正しました */
      border-radius: 25px;
      cursor: pointer;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<div id="gold-canvas" style="position:fixed; top:0; left:0; z-index:-1; width:100%; height:100%;"></div>

<canvas id="gold-glitter" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1;"></canvas>

<script>
const canvas = document.getElementById('gold-glitter');
const ctx = canvas.getContext('2d');
let particles = [];
let accX = 0, accY = 0; // 加速度（傾き）

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// 傾き取得（スマホ/iPad用）
window.addEventListener('deviceorientation', (e) => {
  accX = e.gamma / 20; // 左右の傾き
  accY = e.beta / 20;  // 前後の傾き
});

// 金色のグリッター生成
for(let i=0; i<400; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: (Math.random()-0.5),
    vy: (Math.random()-0.5),
    size: Math.random() * 3 + 1,
    color: `hsl(${40 + Math.random()*20}, 100%, ${50 + Math.random()*30}%)` // 金色のグラデーション
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => {
    p.vx += accX * 0.05;
    p.vy += accY * 0.05;
    p.x += p.vx;
    p.y += p.vy;
    
    // 壁で跳ね返りつつ減速
    if(p.x < 0 || p.x > canvas.width) p.vx *= -0.5;
    if(p.y < 0 || p.y > canvas.height) p.vy *= -0.5;
    
    // グリッター描画
    ctx.fillStyle = p.color;
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#FFD700'; // 金の光
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();
  });
  requestAnimationFrame(draw);
}
draw();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EfaYukacoonar</title>
  
  <link rel="stylesheet" href="/assets/header/header.css">
  <link rel="stylesheet" href="/css/signup.css">
  
  <link rel="icon" type="image/jpeg" href="/favicon.jpg">
</head>
<body>

  {% include header.html %}

  <main style="margin-top: 80px; padding: 20px;">
    <h1>Efa original</h1>
    <img src="/favicon.jpg" alt="Logo">
  </main>

  <script src="/assets/header/header.js"></script>

  <style>
    .signup {
      color: rgb(0, 0, 50);
      background-color: rgb(50, 0, 0);
      border: 2px solid rgb(0, 50, 0);
      height: 50px;
      width: 150px; /* widgh を width に修正しました */
      border-radius: 25px;
      cursor: pointer;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<div id="gold-canvas" style="position:fixed; top:0; left:0; z-index:-1; width:100%; height:100%;"></div>

<canvas id="liquid-acryl" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1;"></canvas>
<button id="sensor-btn" style="position:fixed; top:80px; left:20px; z-index:9999; background:rgba(0,0,0,0.3); border:1px solid #F20789; color:#F20789; padding:8px; cursor:pointer;">ACTIVATE LIQUID</button>

<script>
const canvas = document.getElementById('liquid-acryl');
const ctx = canvas.getContext('2d');
const particles = [];
let gravX = 0, gravY = 1; // 下方向への強い重力

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// センサー許可
document.getElementById('sensor-btn').addEventListener('click', () => {
  if (typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().then(response => {
      if (response == 'granted') {
        window.addEventListener('deviceorientation', (e) => {
          // 傾きを重力ベクトルとして計算（上下逆に傾けたら逆流するように調整）
          gravX = e.gamma / 15;
          gravY = e.beta / 15;
        });
      }
    });
  }
  document.getElementById('sensor-btn').style.display = 'none';
});

// 粒を大量生成（小さく、3000個）
for(let i=0; i<3000; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: 0, vy: 0,
    size: Math.random() * 0.8 + 0.3, // さらに小さく！
    color: `hsl(${40 + Math.random()*20}, 90%, 60%)`
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  particles.forEach(p => {
    // 重力の影響
    p.vx += gravX * 0.2;
    p.vy += gravY * 0.2;
    
    // 粘度（ここを上げるとドロっとする）
    p.vx *= 0.85;
    p.vy *= 0.85;
    
    p.x += p.vx;
    p.y += p.vy;
    
    // 「画面の縁」で完全に止める（反射禁止）
    if(p.x < 0) { p.x = 0; p.vx = 0; }
    if(p.x > canvas.width) { p.x = canvas.width; p.vx = 0; }
    if(p.y < 0) { p.y = 0; p.vy = 0; }
    if(p.y > canvas.height) { p.y = canvas.height; p.vy = 0; }
    
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();
  });
  
  requestAnimationFrame(draw);
}
draw();
</script>

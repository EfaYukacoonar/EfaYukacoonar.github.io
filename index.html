<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EfaYukacoonar</title>
  
  <link rel="stylesheet" href="/assets/header/header.css">
  <link rel="stylesheet" href="/css/signup.css">
  
  <link rel="icon" type="image/jpeg" href="/favicon.jpg">
</head>
<body>

  {% include header.html %}

  <main style="margin-top: 80px; padding: 20px;">
    <h1>Efa original</h1>
    <img src="/favicon.jpg" alt="Logo">
  </main>

  <script src="/assets/header/header.js"></script>

  <style>
    .signup {
      color: rgb(0, 0, 50);
      background-color: rgb(50, 0, 0);
      border: 2px solid rgb(0, 50, 0);
      height: 50px;
      width: 150px; /* widgh を width に修正しました */
      border-radius: 25px;
      cursor: pointer;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<div id="gold-canvas" style="position:fixed; top:0; left:0; z-index:-1; width:100%; height:100%;"></div>

<canvas id="liquid-acryl" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; pointer-events:none;"></canvas>
<button id="sensor-btn" style="position:fixed; top:80px; left:20px; z-index:9999; background:rgba(0,0,0,0.5); border:1px solid #F20789; color:#F20789; padding:10px; cursor:pointer;">ACTIVATE LIQUID</button>

<script>
const canvas = document.getElementById('liquid-acryl');
const ctx = canvas.getContext('2d');
let particles = [];
let gravX = 0, gravY = 1;

function init() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  
  // 画面面積の約30%を埋める計算（1粒子あたり約10x10ピクセルの空間を割り当て）
  const area = canvas.width * canvas.height;
  const count = Math.floor((area * 0.3) / 100); 
  
  particles = [];
  for(let i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      vx: 0, vy: 0,
      size: Math.random() * 0.8 + 0.5,
      color: `hsl(${40 + Math.random()*20}, 90%, 60%)`
    });
  }
}

window.addEventListener('resize', init);
init();

document.getElementById('sensor-btn').addEventListener('click', () => {
  if (typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().then(response => {
      if (response == 'granted') {
        window.addEventListener('deviceorientation', (e) => {
          // iPadの向きに合わせて補正（gamma:左右, beta:前後）
          gravX = e.gamma / 10;
          gravY = e.beta / 10;
        });
      }
    });
  }
  document.getElementById('sensor-btn').style.display = 'none';
});

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  particles.forEach((p, i) => {
    // 物理演算
    p.vx += gravX * 0.2;
    p.vy += gravY * 0.2;
    p.vx *= 0.90; // 粘度
    p.vy *= 0.90;
    
    // 簡易衝突判定（重なりすぎ防止：前の粒子との距離を保つ）
    if (i > 0) {
      let dx = p.x - particles[i-1].x;
      let dy = p.y - particles[i-1].y;
      if (Math.abs(dx) < 2 && Math.abs(dy) < 2) {
        p.vx += dx * 0.1;
        p.vy += dy * 0.1;
      }
    }

    p.x += p.vx;
    p.y += p.vy;
    
    // 壁での停止
    if(p.x < 0) { p.x = 0; p.vx = 0; }
    if(p.x > canvas.width) { p.x = canvas.width; p.vx = 0; }
    if(p.y < 0) { p.y = 0; p.vy = 0; }
    if(p.y > canvas.height) { p.y = canvas.height; p.vy = 0; }
    
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();
  });
  
  requestAnimationFrame(draw);
}
draw();
</script>

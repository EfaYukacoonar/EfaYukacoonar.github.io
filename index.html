<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EfaYukacoonar</title>
  
  <link rel="stylesheet" href="/assets/header/header.css">
  <link rel="stylesheet" href="/css/signup.css">
  
  <link rel="icon" type="image/jpeg" href="/favicon.jpg">
</head>
<body>

  {% include header.html %}

  <main style="margin-top: 80px; padding: 20px;">
    <h1>Efa original</h1>
    <img src="/favicon.jpg" alt="Logo">
  </main>

  <script src="/assets/header/header.js"></script>

  <style>
    .signup {
      color: rgb(0, 0, 50);
      background-color: rgb(50, 0, 0);
      border: 2px solid rgb(0, 50, 0);
      height: 50px;
      width: 150px; /* widgh を width に修正しました */
      border-radius: 25px;
      cursor: pointer;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<div id="gold-canvas" style="position:fixed; top:0; left:0; z-index:-1; width:100%; height:100%;"></div>

<canvas id="liquid-acryl" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; pointer-events:none;"></canvas>
<button id="sensor-btn" style="position:fixed; top:80px; left:20px; z-index:9999; cursor:pointer;">ACTIVATE LIQUID</button>

<script>
const canvas = document.getElementById('liquid-acryl');
const ctx = canvas.getContext('2d');
let particles = [];
let gx = 0, gy = 0; // 重力ベクトル

function init() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  // 画面の30%を埋める量を計算（解像度に応じて最適化）
  const count = Math.floor((canvas.width * canvas.height) / 150);
  particles = Array.from({ length: count }, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: 0, vy: 0,
    size: Math.random() * 0.8 + 0.4,
    color: `hsl(${40 + Math.random()*20}, 90%, 60%)`
  }));
}

init();
window.addEventListener('resize', init);

document.getElementById('sensor-btn').addEventListener('click', () => {
  if (typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().then(res => {
      if (res === 'granted') {
        window.addEventListener('deviceorientation', (e) => {
          // 傾きを重力ベクトルとして反映（iPadの向きを考慮）
          gx = e.gamma / 20;
          gy = e.beta / 20;
        });
      }
    });
    document.getElementById('sensor-btn').style.display = 'none';
  }
});

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  particles.forEach(p => {
    // 重力と速度
    p.vx += gx;
    p.vy += gy;
    
    // 速度制限（速くなりすぎないようにして「とろみ」を出す）
    const speed = Math.sqrt(p.vx**2 + p.vy**2);
    if (speed > 5) { p.vx *= 0.9; p.vy *= 0.9; }
    
    p.x += p.vx;
    p.y += p.vy;

    // 壁との衝突（反射させず、壁に沿って止まる）
    if(p.x < 0) { p.x = 0; p.vx = 0; }
    if(p.x > canvas.width) { p.x = canvas.width; p.vx = 0; }
    if(p.y < 0) { p.y = 0; p.vy = 0; }
    if(p.y > canvas.height) { p.y = canvas.height; p.vy = 0; }

    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, p.size, p.size); // 円より四角の方がキラキラして見えます
  });
  
  requestAnimationFrame(draw);
}
draw();
</script>

layout: none
---
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EfaYukacoonar</title>
  
  <link rel="stylesheet" href="/assets/header/header.css">
  <link rel="stylesheet" href="/css/signup.css">
  
  <link rel="icon" type="image/jpeg" href="/favicon.jpg">
</head>
<body>

  {% include header.html %}

  <main style="margin-top: 80px; padding: 20px;">
    <h1>Efa original</h1>
    <img src="/favicon.jpg" alt="Logo">
  </main>

  <script src="/assets/header/header.js"></script>

  <style>
    .signup {
      color: rgb(0, 0, 50);
      background-color: rgb(50, 0, 0);
      border: 2px solid rgb(0, 50, 0);
      height: 50px;
      width: 150px; /* widgh を width に修正しました */
      border-radius: 25px;
      cursor: pointer;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<div id="gold-canvas" style="position:fixed; top:0; left:0; z-index:-1; width:100%; height:100%;"></div>

<canvas id="liquid-acryl" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1;"></canvas>

<button id="sensor-btn" style="position:fixed; top:80px; left:20px; z-index:9999; background:rgba(0,0,0,0.5); border:1px solid #F20789; color:#F20789; padding:10px; cursor:pointer; font-family:monospace;">INITIALIZE LIQUID</button>

<script>
const canvas = document.getElementById('liquid-acryl');
const ctx = canvas.getContext('2d');
let particles = [];
let accX = 0, accY = 0;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// センサー許可（Safari対応）
document.getElementById('sensor-btn').addEventListener('click', () => {
  if (typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission().then(response => {
      if (response == 'granted') {
        window.addEventListener('deviceorientation', (e) => {
          accX = e.gamma / 5;
          accY = e.beta / 5;
        });
      }
    });
  }
  document.getElementById('sensor-btn').style.display = 'none';
});

// 金色のグリッター生成（四角いカケラを混ぜることでアクリルっぽさUP）
for(let i=0; i<1500; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: 0, vy: 0,
    size: Math.random() * 1.8 + 0.5,
    color: `hsl(${40 + Math.random()*20}, 90%, 60%)`,
    isSquare: Math.random() > 0.7 // 30%の確率で四角いカケラに
  });
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  particles.forEach(p => {
    // 物理演算（粘り気のある移動）
    p.vx += accX * 0.03;
    p.vy += accY * 0.03;
    p.vx *= 0.92; // 摩擦係数：ここをいじると「ドロっと」感が変わる
    p.vy *= 0.92;
    p.x += p.vx;
    p.y += p.vy;
    
    // 画面内に留める
    if(p.x < 0 || p.x > canvas.width) p.vx *= -0.3;
    if(p.y < 0 || p.y > canvas.height) p.vy *= -0.3;
    
    // 描画
    ctx.globalAlpha = 0.85;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    if(p.isSquare) {
      ctx.fillRect(p.x, p.y, p.size * 1.5, p.size * 1.5);
    } else {
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    }
    ctx.fill();
  });
  
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>

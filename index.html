<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EfaYukacoonar</title>
  
  <link rel="stylesheet" href="/assets/header/header.css">
  <link rel="stylesheet" href="/css/signup.css">
  
  <link rel="icon" type="image/jpeg" href="/favicon.jpg">
</head>
<body>

  {% include header.html %}

  <main style="margin-top: 80px; padding: 20px;">
    <h1>Efa original</h1>
    <img src="/favicon.jpg" alt="Logo">
  </main>

  <script src="/assets/header/header.js"></script>

  <style>
    .signup {
      color: rgb(0, 0, 50);
      background-color: rgb(50, 0, 0);
      border: 2px solid rgb(0, 50, 0);
      height: 50px;
      width: 150px; /* widgh を width に修正しました */
      border-radius: 25px;
      cursor: pointer;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<div id="gold-canvas" style="position:fixed; top:0; left:0; z-index:-1; width:100%; height:100%;"></div>

<script>
  // ここに金色の粒子を泳がせるコードが入ります
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({alpha: true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.getElementById('gold-canvas').appendChild(renderer.domElement);

  // 金色の粒子を作成
  const geometry = new THREE.BufferGeometry();
  const particles = 2000;
  const positions = new Float32Array(particles * 3);
  for(let i=0; i<particles*3; i++) positions[i] = (Math.random() - 0.5) * 10;
  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

  const material = new THREE.PointsMaterial({color: 0xD4AF37, size: 0.05}); // 金色
  const points = new THREE.Points(geometry, material);
  scene.add(points);

  camera.position.z = 5;

  // 傾きに反応して動かす
  window.addEventListener('deviceorientation', (e) => {
    points.rotation.x = e.beta * 0.01;
    points.rotation.y = e.gamma * 0.01;
  });

  function animate() {
    requestAnimationFrame(animate);
    points.rotation.y += 0.002; // ゆっくり回転
    renderer.render(scene, camera);
  }
  animate();
</script>
</body>
</html>

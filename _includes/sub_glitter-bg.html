<canvas id="glitter-canvas"></canvas>

<button id="gyro-btn" style="position: fixed; top: 20px; left: 20px; z-index: 10; padding: 10px 20px;">
  キラキラを起動する
</button>

<style>
  #glitter-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: -1;
    background: #000;
  }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
  (function() {
    const canvas = document.getElementById('glitter-canvas');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true });
    
    // リサイズ対応関数
    function onResize() {
      const width = window.innerWidth;
      const height = window.innerHeight;
      renderer.setSize(width, height);
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
    }
    window.addEventListener('resize', onResize);
    onResize();

    camera.position.z = 5;

    const count = 1000;
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(count * 3);
    for (let i = 0; i < count * 3; i++) positions[i] = (Math.random() - 0.5) * 20;
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const material = new THREE.PointsMaterial({ color: 0xffd700, size: 0.1 });
    const particles = new THREE.Points(geometry, material);
    scene.add(particles);

    let tiltX = 0, tiltY = 0;

    document.getElementById('gyro-btn').addEventListener('click', function() {
      this.style.display = 'none';
      if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission().then(r => {
          if (r === 'granted') {
            window.addEventListener('deviceorientation', (e) => {
              // window.orientation でデバイスの向きを取得
              const o = window.orientation || 0;
              if (o === 90 || o === -90) {
                // 横向き時の補正
                tiltX = e.beta / 45;
                tiltY = -e.gamma / 45;
              } else {
                // 縦向き
                tiltX = e.gamma / 45;
                tiltY = e.beta / 45;
              }
            });
          }
        });
      }
    });

    function animate() {
      requestAnimationFrame(animate);
      particles.rotation.x += ((-tiltY * 0.5) - particles.rotation.x) * 0.05;
      particles.rotation.y += ((tiltX * 0.5) - particles.rotation.y) * 0.05;
      renderer.render(scene, camera);
    }
    animate();
  })();
</script>

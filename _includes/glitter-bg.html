<canvas id="glitter-canvas"></canvas>
<button id="gyro-btn" style="position: fixed; top: 20px; left: 20px; z-index: 10; padding: 15px 30px;">起動</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script id="vertexShader" type="x-shader/x-vertex">
  uniform vec2 uGravity;
  attribute float life;
  varying float vLife;
  void main() {
    vec3 pos = position;
    pos.xy += uGravity * 10.0; // 重力反映
    // 壁での反射（簡易的だけどGPUでやるから爆速）
    if (abs(pos.x) > 1.0) pos.x = sign(pos.x) * 1.0;
    if (abs(pos.y) > 1.0) pos.y = sign(pos.y) * 1.0;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
    gl_PointSize = 1.5;
  }
</script>

<script id="fragmentShader" type="x-shader/x-fragment">
  void main() { gl_FragColor = vec4(1.0, 0.84, 0.0, 0.8); }
</script>

<script>
  const canvas = document.getElementById('glitter-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
  const scene = new THREE.Scene();
  const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 100);
  
  const count = 500000;
  const positions = new Float32Array(count * 3);
  for(let i=0; i<count*3; i++) positions[i] = (Math.random()-0.5)*2.0;
  
  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  
  const material = new THREE.ShaderMaterial({
    uniforms: { uGravity: { value: new THREE.Vector2(0, 0) } },
    vertexShader: document.getElementById('vertexShader').textContent,
    fragmentShader: document.getElementById('fragmentShader').textContent
  });
  
  const points = new THREE.Points(geometry, material);
  scene.add(points);

  // ローパスフィルタの変数
  let gx = 0, gy = 0, filteredGx = 0, filteredGy = 0;
  const alpha = 0.02; // ここを小さくするとヌルヌル感が強まる

  window.addEventListener('deviceorientation', (e) => {
    gx = (e.gamma || 0) / 400;
    gy = (e.beta || 0) / 400;
  });

  function resize() {
    renderer.setSize(window.innerWidth, window.innerHeight);
  }
  window.addEventListener('resize', resize);
  resize();

  function animate() {
    // フィルタ適用（ここで重厚な動きを作る）
    filteredGx += (gx - filteredGx) * alpha;
    filteredGy += (gy - filteredGy) * alpha;
    
    material.uniforms.uGravity.value.set(filteredGx, -filteredGy);
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
  }
  
  document.getElementById('gyro-btn').addEventListener('click', (e) => {
    e.target.style.display = 'none';
    if (DeviceOrientationEvent.requestPermission) DeviceOrientationEvent.requestPermission();
    animate();
  });
</script>

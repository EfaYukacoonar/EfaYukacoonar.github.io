<canvas id="glitter-canvas"></canvas>
<style>
  #glitter-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    z-index: -1;
    background: #000;
  }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
  const canvas = document.getElementById('glitter-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);

  const scene = new THREE.Scene();
  // 2Dなのでカメラは固定（平行投影）
  const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);

  // グリッターの素（今回はシンプルに点群）
  const count = 800;
  const geometry = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  const vel = new Float32Array(count * 3); // 速度データ

  for (let i = 0; i < count * 3; i++) {
    pos[i] = (Math.random() - 0.5) * 2;
    vel[i] = 0;
  }
  geometry.setAttribute('position', new THREE.BufferAttribute(pos, 3));

  const material = new THREE.PointsMaterial({ color: 0xffd700, size: 0.02 });
  const points = new THREE.Points(geometry, material);
  scene.add(points);

  let gx = 0, gy = 0; // 重力ベクトル
  window.addEventListener('deviceorientation', (e) => {
    gx = e.gamma / 45;
    gy = e.beta / 45;
  });

  function animate() {
    requestAnimationFrame(animate);
    const positions = points.geometry.attributes.position.array;

    for (let i = 0; i < count; i++) {
      let ix = i * 3;
      // 重力（傾き）を速度に加算
      vel[ix] += gx * 0.001;
      vel[ix+1] -= gy * 0.001;
      // 粘性（少しずつ速度を落とす）
      vel[ix] *= 0.98;
      vel[ix+1] *= 0.98;
      // 位置更新
      positions[ix] += vel[ix];
      positions[ix+1] += vel[ix+1];
      
      // 壁の跳ね返り
      if (positions[ix] > 1 || positions[ix] < -1) vel[ix] *= -1;
      if (positions[ix+1] > 1 || positions[ix+1] < -1) vel[ix+1] *= -1;
    }
    points.geometry.attributes.position.needsUpdate = true;
    renderer.render(scene, camera);
  }
  animate();
</script>

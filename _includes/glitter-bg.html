<canvas id="glitter-canvas"></canvas>
<button id="gyro-btn" style="position: fixed; top: 20px; left: 20px; z-index: 10; padding: 10px 20px;">キラキラを起動</button>

<style>
  #glitter-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; background: #000; }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
  (function() {
    const canvas = document.getElementById('glitter-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, powerPreference: "high-performance" });
    
    let w, h, aspect;
    function resize() {
      w = window.innerWidth; h = window.innerHeight;
      aspect = w / h;
      renderer.setSize(w, h);
      camera.left = -aspect; camera.right = aspect;
      camera.top = 1; camera.bottom = -1;
      camera.updateProjectionMatrix();
    }
    
    const scene = new THREE.Scene();
    const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 100);
    camera.position.z = 10;
    window.addEventListener('resize', resize);
    resize();

    // 粒の数を50万個に！（これ以上はiPadの限界が近いよ！）
    const count = 500000; 
    const geometry = new THREE.BufferGeometry();
    const pos = new Float32Array(count * 3);
    const vel = new Float32Array(count * 2); 
    const props = new Float32Array(count); // 質量と摩擦を混ぜて保存

    for (let i = 0; i < count; i++) {
      pos[i*3] = (Math.random() - 0.5) * 2 * aspect;
      pos[i*3+1] = (Math.random() - 0.5) * 2;
      pos[i*3+2] = (Math.random() - 0.5) * 0.05;
      // 質量と摩擦を個別に決定（これがバラつきの命）
      props[i] = 0.8 + Math.random() * 0.4; 
    }
    geometry.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    
    // 粒を小さくして、数で攻める
    const material = new THREE.PointsMaterial({ color: 0xffd700, size: 0.005, transparent: true, opacity: 0.7 });
    const points = new THREE.Points(geometry, material);
    scene.add(points);

    let gx = 0, gy = 0, isEnabled = false;
    document.getElementById('gyro-btn').addEventListener('click', () => {
      document.getElementById('gyro-btn').style.display = 'none';
      if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission().then(r => { if(r === 'granted') isEnabled = true; });
      } else { isEnabled = true; }
    });

    window.addEventListener('deviceorientation', (e) => {
      if(!isEnabled) return;
      const o = window.orientation || 0;
      gx = (o === 90 || o === -90 ? e.beta : e.gamma) / 400;
      gy = (o === 90 || o === -90 ? -e.gamma : e.beta) / 400;
    });

    function animate() {
      requestAnimationFrame(animate);
      const p = points.geometry.attributes.position.array;
      
      for (let i = 0; i < count; i++) {
        let ix = i * 3;
        let v_ix = i * 2;

        if(isEnabled) {
          vel[v_ix] += gx * props[i];
          vel[v_ix+1] -= gy * props[i];
        }
        vel[v_ix] *= 0.96; // 粘性
        vel[v_ix+1] *= 0.96;
        
        p[ix] += vel[v_ix];
        p[ix+1] += vel[v_ix+1];
        
        // 境界＆重なり防止のランダム跳ね返り
        if(p[ix] > aspect) { p[ix] = aspect; vel[v_ix] *= -0.2 * Math.random(); }
        else if(p[ix] < -aspect) { p[ix] = -aspect; vel[v_ix] *= -0.2 * Math.random(); }
        if(p[ix+1] > 1) { p[ix+1] = 1; vel[v_ix+1] *= -0.2 * Math.random(); }
        else if(p[ix+1] < -1) { p[ix+1] = -1; vel[v_ix+1] *= -0.2 * Math.random(); }
      }
      points.geometry.attributes.position.needsUpdate = true;
      renderer.render(scene, camera);
    }
    animate();
  })();
</script>

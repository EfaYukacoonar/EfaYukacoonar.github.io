<canvas id="glitter-canvas"></canvas>
<button id="gyro-btn" style="position: fixed; top: 20px; left: 20px; z-index: 10; padding: 10px 20px;">キラキラを起動</button>

<style>
  #glitter-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; background: #000; }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
  (function() {
    const canvas = document.getElementById('glitter-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true });
    
    // 画面の縦横比を考慮した可動域の管理
    let width, height, aspect;
    function resize() {
      width = window.innerWidth;
      height = window.innerHeight;
      aspect = width / height;
      renderer.setSize(width, height);
      // カメラの表示範囲を画面のピクセルサイズに合わせる
      camera.left = -aspect;
      camera.right = aspect;
      camera.top = 1;
      camera.bottom = -1;
      camera.updateProjectionMatrix();
    }
    
    const scene = new THREE.Scene();
    const camera = new THREE.OrthographicCamera(-aspect, aspect, 1, -1, 0, 100);
    camera.position.z = 10;
    window.addEventListener('resize', resize);
    resize();

    const count = 1200;
    const geometry = new THREE.BufferGeometry();
    const pos = new Float32Array(count * 3);
    const vel = new Float32Array(count * 3);
    const friction = new Float32Array(count);
    const mass = new Float32Array(count);

    for (let i = 0; i < count; i++) {
      pos[i*3] = (Math.random() - 0.5) * 2 * aspect; // 縦横比に合わせて配置
      pos[i*3+1] = (Math.random() - 0.5) * 2;
      pos[i*3+2] = (Math.random() - 0.5) * 0.1; // 超薄型（奥行き）
      friction[i] = 0.92 + Math.random() * 0.05;
      mass[i] = 0.5 + Math.random() * 1.5;
    }
    geometry.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const material = new THREE.PointsMaterial({ color: 0xffd700, size: 0.02 });
    const points = new THREE.Points(geometry, material);
    scene.add(points);

    let gx = 0, gy = 0, isEnabled = false;
    document.getElementById('gyro-btn').addEventListener('click', () => {
      document.getElementById('gyro-btn').style.display = 'none';
      if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission().then(r => { if(r === 'granted') isEnabled = true; });
      } else { isEnabled = true; }
    });

    window.addEventListener('deviceorientation', (e) => {
      if(!isEnabled) return;
      const o = window.orientation || 0;
      gx = (o === 90 || o === -90 ? e.beta : e.gamma) / 200;
      gy = (o === 90 || o === -90 ? -e.gamma : e.beta) / 200;
    });

    function animate() {
      requestAnimationFrame(animate);
      const p = points.geometry.attributes.position.array;
      for (let i = 0; i < count; i++) {
        if(isEnabled) {
          vel[i*3] += gx * mass[i];
          vel[i*3+1] -= gy * mass[i];
        }
        vel[i*3] *= friction[i];
        vel[i*3+1] *= friction[i];
        p[i*3] += vel[i*3];
        p[i*3+1] += vel[i*3+1];
        
        // 境界を画面のaspectに合わせる
        if(p[i*3] > aspect || p[i*3] < -aspect) { vel[i*3] *= -0.5; p[i*3] = Math.max(-aspect, Math.min(aspect, p[i*3])); }
        if(p[i*3+1] > 1 || p[i*3+1] < -1) { vel[i*3+1] *= -0.5; p[i*3+1] = Math.max(-1, Math.min(1, p[i*3+1])); }
      }
      points.geometry.attributes.position.needsUpdate = true;
      renderer.render(scene, camera);
    }
    animate();
  })();
</script>

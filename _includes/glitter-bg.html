<canvas id="glitter-canvas"></canvas>

<button id="gyro-btn" style="position: fixed; top: 20px; left: 20px; z-index: 10; padding: 10px 20px;">
  キラキラを起動する
</button>

<style>
  #glitter-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: -1;
    background: #000;
  }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
  (function() {
    const canvas = document.getElementById('glitter-canvas');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true });
    
    function onResize() {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    }
    window.addEventListener('resize', onResize);
    onResize();

    camera.position.z = 5;

    const count = 1000;
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(count * 3);
    for (let i = 0; i < count * 3; i++) positions[i] = (Math.random() - 0.5) * 20;
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const material = new THREE.PointsMaterial({ color: 0xffd700, size: 0.1 });
    const particles = new THREE.Points(geometry, material);
    scene.add(particles);

    // クォータニオンによる滑らかな回転
    const targetQuaternion = new THREE.Quaternion();
    const euler = new THREE.Euler(0, 0, 0, 'YXZ'); // 軸の重なりを防ぐ順序

    document.getElementById('gyro-btn').addEventListener('click', function() {
      this.style.display = 'none';
      if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission().then(r => {
          if (r === 'granted') {
            window.addEventListener('deviceorientation', (e) => {
              // 度をラジアンに変換
              const alpha = e.alpha ? THREE.MathUtils.degToRad(e.alpha) : 0;
              const beta = e.beta ? THREE.MathUtils.degToRad(e.beta) : 0;
              const gamma = e.gamma ? THREE.MathUtils.degToRad(e.gamma) : 0;
              
              euler.set(beta, alpha, -gamma);
              targetQuaternion.setFromEuler(euler);
            });
          }
        });
      }
    });

    function animate() {
      requestAnimationFrame(animate);
      // 今の回転から目標の回転へ滑らかに補間（Slerp）
      particles.quaternion.slerp(targetQuaternion, 0.1);
      renderer.render(scene, camera);
    }
    animate();
  })();
</script>

<canvas id="glitter-canvas"></canvas>
<style>
  #glitter-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: -1;
    background: #000;
  }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
  (function() {
    const canvas = document.getElementById('glitter-canvas');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.position.z = 5;

    // 金粉（パーティクル）生成
    const count = 1000;
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(count * 3);
    for (let i = 0; i < count * 3; i++) positions[i] = (Math.random() - 0.5) * 20;
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const material = new THREE.PointsMaterial({ color: 0xffd700, size: 0.1 });
    const particles = new THREE.Points(geometry, material);
    scene.add(particles);

    // ジャイロ用の変数
    let tiltX = 0;
    let tiltY = 0;

    // 1. DeviceOrientationEventの実装（傾き）
    window.addEventListener('deviceorientation', (event) => {
      // event.beta: 前後傾き, event.gamma: 左右傾き
      tiltX = event.gamma / 45; 
      tiltY = event.beta / 45;
    });

    // 2. iOS対策：タップで許可を促す（これが無いと動かない）
    window.addEventListener('click', () => {
      if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission().then(permissionState => {
          if (permissionState === 'granted') console.log("許可されました！");
        });
      }
    });

    function animate() {
      requestAnimationFrame(animate);
      // 傾きに応じてカメラを少し動かす
      camera.position.x += (tiltX - camera.position.x) * 0.05;
      camera.position.y += (-tiltY - camera.position.y) * 0.05;
      camera.lookAt(scene.position);
      renderer.render(scene, camera);
    }
    animate();
  })();
</script>

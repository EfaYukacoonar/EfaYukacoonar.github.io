<canvas id="glitter-canvas"></canvas>
<style>
  #glitter-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: -1;
    pointer-events: auto;
  }
</style>
<script>
  if (typeof THREE !== 'undefined') {
      const canvas = document.getElementById('glitter-canvas');
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });

      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.position.z = 5;

      // 金ピカ素材（MeshStandardMaterial）を追加
      // 光を反射するために光源（Light）が必要になります
      const light = new THREE.DirectionalLight(0xffffff, 1);
      light.position.set(1, 1, 1);
      scene.add(light);
      scene.add(new THREE.AmbientLight(0xffffff, 0.5));

      const geometry = new THREE.IcosahedronGeometry(0.1, 0); // よりグリッターっぽい多面体形状に
      const material = new THREE.MeshStandardMaterial({ 
          color: 0xffd700, 
          metalness: 0.8, // 金属感
          roughness: 0.2  // ツルツル感
      });

      const count = 300;
      const mesh = new THREE.InstancedMesh(geometry, material, count);

      const dummy = new THREE.Object3D();
      for (let i = 0; i < count; i++) {
          dummy.position.set((Math.random() - 0.5) * 10, (Math.random() - 0.5) * 10, 0);
          dummy.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
          dummy.updateMatrix();
          mesh.setMatrixAt(i, dummy.matrix);
      }
      scene.add(mesh);

      function animate() {
          requestAnimationFrame(animate);
          mesh.rotation.z += 0.005; // ゆっくり回転させてキラキラ感を演出
          renderer.render(scene, camera);
      }
      animate();
  }
</script>
<script type="module" src="{{ '/assets/js/glitter-bg.js' | relative_url }}"></script>

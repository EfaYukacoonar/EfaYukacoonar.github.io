<canvas id="glitter-canvas"></canvas>
<style>
  #glitter-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: -1;
  }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
  (function() {
    const canvas = document.getElementById('glitter-canvas');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.position.z = 5;

    // 1. 光源を追加（これでキラキラする）
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);
    const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
    directionalLight.position.set(1, 1, 2);
    scene.add(directionalLight);

    // 2. 金色の質感設定
    const geometry = new THREE.IcosahedronGeometry(0.08, 0);
    const material = new THREE.MeshStandardMaterial({ 
      color: 0xffd700, 
      metalness: 0.9, 
      roughness: 0.1 
    });

    const count = 300;
    const mesh = new THREE.InstancedMesh(geometry, material, count);

    const dummy = new THREE.Object3D();
    const positions = [];
    for (let i = 0; i < count; i++) {
      dummy.position.set((Math.random() - 0.5) * 15, (Math.random() - 0.5) * 10, (Math.random() - 0.5) * 5);
      dummy.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
      dummy.updateMatrix();
      mesh.setMatrixAt(i, dummy.matrix);
      positions.push(dummy.position.clone());
    }
    scene.add(mesh);

    // 3. 全体回転を止めて、粒一つ一つをわずかに揺らす
    function animate() {
      requestAnimationFrame(animate);
      const time = Date.now() * 0.001;
      for (let i = 0; i < count; i++) {
        mesh.getMatrixAt(i, dummy.matrix);
        // ゆっくりふわふわ動かす
        dummy.position.y = positions[i].y + Math.sin(time + i) * 0.1;
        dummy.updateMatrix();
        mesh.setMatrixAt(i, dummy.matrix);
      }
      mesh.instanceMatrix.needsUpdate = true;
      renderer.render(scene, camera);
    }
    animate();
  })();
</script>

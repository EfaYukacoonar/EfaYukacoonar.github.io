<canvas id="glitter-canvas" style="opacity: 0; transition: opacity 1s;"></canvas>

<div id="overlay" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); z-index: 100; display: flex; align-items: center; justify-content: center;">
  <div style="text-align: center; color: #ffd700; font-family: sans-serif;">
    <p>ジャイロでグリッターを起動しますか？</p>
    <button id="yes-btn" style="padding: 15px 30px; font-size: 20px; background: #ffd700; border: none; cursor: pointer;">YES</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script id="vertexShader" type="x-shader/x-vertex">
  uniform vec2 uGravity;
  attribute float mass;
  
  void main() {
    vec3 pos = position;
    
    // 雪のように常に下に降る力を追加
    vec2 snowForce = vec2(0.0, -0.01); 
    
    // 傾きと雪の力を合成
    pos.xy += (uGravity * mass * 5.0) + (snowForce * mass);
    
    // 底に到達したら静止（積もる）
    if (pos.y < -0.94) {
      pos.y = -0.94;
      pos.x += sin(pos.x * 500.0) * 0.002;
    }
    
    // 画面外に飛んだら上から再生成（雪のループ）
    if (pos.y < -1.0) pos.y = 1.0;
    
    pos.x = clamp(pos.x, -0.98, 0.98);
    gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
    gl_PointSize = 1.2;
  }
</script>

<script>
  const canvas = document.getElementById('glitter-canvas');
  const overlay = document.getElementById('overlay');
  
  document.getElementById('yes-btn').addEventListener('click', () => {
    overlay.style.display = 'none'; // ポップアップ消去
    canvas.style.opacity = '1';    // キャンバス表示
    
    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
      DeviceOrientationEvent.requestPermission().then(r => { if(r === 'granted') animate(); });
    } else {
      animate();
    }
  });
</script>

<script id="fragmentShader" type="x-shader/x-fragment">
  void main() {
    float dist = length(gl_PointCoord - vec2(0.5));
    if (dist > 0.5) discard;
    gl_FragColor = vec4(0.8, 0.35, 0.15, 0.6);
  }
</script>

<script>
  (function() {
  const canvas = document.getElementById('glitter-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: false, powerPreference: "high-performance" });
  
  // ピクセル比をiPadのRetinaディスプレイに合わせて強制設定
  renderer.setPixelRatio(window.devicePixelRatio || 1);
  renderer.setClearColor(0x000000, 1);
  
  const scene = new THREE.Scene();
  const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 100);
  camera.position.z = 10;
  scene.add(camera);
  
  const count = 500000;
  const positions = new Float32Array(count * 3);
  const masses = new Float32Array(count);
  
  for(let i = 0; i < count; i++) {
    positions[i*3] = (Math.random() - 0.5) * 1.8;
    positions[i*3+1] = (Math.random() - 0.5) * 1.8;
    positions[i*3+2] = 0;
    masses[i] = 0.5 + Math.random() * 1.5;
  }
  
  const geometry = new THREE.BufferGeometry();
  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geometry.setAttribute('mass', new THREE.BufferAttribute(masses, 1));
  
  const material = new THREE.ShaderMaterial({
    uniforms: { 
      uGravity: { value: new THREE.Vector2(0, 0) },
      uAspect: { value: window.innerWidth / window.innerHeight }
    },
    vertexShader: document.getElementById('vertexShader').textContent,
    fragmentShader: document.getElementById('fragmentShader').textContent,
    transparent: true,
    blending: THREE.AdditiveBlending
  });
  
  const points = new THREE.Points(geometry, material);
  scene.add(points);

  function resize() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    renderer.setSize(w, h);
    
    const aspect = w / h;
    camera.left = -aspect;
    camera.right = aspect;
    camera.top = 1;
    camera.bottom = -1;
    camera.updateProjectionMatrix();

    if (material) {
      material.uniforms.uAspect.value = aspect;
    }
  }

  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', resize);
  
  // 起動直後の描画を強制
  resize();
  renderer.render(scene, camera);

  let gx = 0, gy = 0, filteredGx = 0, filteredGy = 0;
  const alpha = 0.02;

  window.addEventListener('deviceorientation', (e) => {
    let gx = 0, gy = 0;
    const o = window.orientation || 0; 
    
    if (o === 0) {
      gx = e.gamma / 400;
      gy = e.beta / 400;
    } else if (o === 90) {
      gx = e.beta / 400;
      gy = -e.gamma / 400;
    } else if (o === -90) {
      gx = -e.beta / 400;
      gy = e.gamma / 400;
    } else if (o === 180) {
      gx = -e.gamma / 400;
      gy = -e.beta / 400;
    }

    if (Math.abs(gx) < 0.005) gx = 0;
    if (Math.abs(gy) < 0.005) gy = 0;

    window.currentGx = gx;
    window.currentGy = gy;
  });

  function animate() {
    filteredGx += ((window.currentGx || 0) - filteredGx) * alpha;
    filteredGy += ((window.currentGy || 0) - filteredGy) * alpha;
    
    material.uniforms.uGravity.value.set(filteredGx, -filteredGy);
    
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
  }
    
  document.getElementById('gyro-btn').addEventListener('click', (e) => {
    e.target.style.display = 'none';
    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
      DeviceOrientationEvent.requestPermission().then(r => { if(r === 'granted') animate(); });
    } else {
      animate();
    }
  });
})();
</script>

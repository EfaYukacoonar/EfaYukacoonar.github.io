<canvas id="glitter-canvas"></canvas>

<button id="gyro-btn" style="position: fixed; top: 20px; left: 20px; z-index: 10; padding: 10px 20px;">
  キラキラを起動する
</button>

<style>
  #glitter-canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    z-index: -1;
    background: #000;
  }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
  (function() {
    const canvas = document.getElementById('glitter-canvas');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.position.z = 5;

    const count = 1000;
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(count * 3);
    for (let i = 0; i < count * 3; i++) positions[i] = (Math.random() - 0.5) * 20;
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const material = new THREE.PointsMaterial({ color: 0xffd700, size: 0.1 });
    const particles = new THREE.Points(geometry, material);
    scene.add(particles);

    let tiltX = 0;
    let tiltY = 0;

    // ボタンを押した時の処理
    document.getElementById('gyro-btn').addEventListener('click', function() {
      this.style.display = 'none'; // ボタンを隠す

      // iOS13+ の許可リクエスト
      if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission()
          .then(response => {
            if (response === 'granted') {
              window.addEventListener('deviceorientation', (e) => {
                tiltX = e.gamma / 45;
                tiltY = e.beta / 45;
              });
            }
          })
          .catch(console.error);
      } else {
        // iOS以外の場合
        window.addEventListener('deviceorientation', (e) => {
          tiltX = e.gamma / 45;
          tiltY = e.beta / 45;
        });
      }
    });

    function animate() {
      requestAnimationFrame(animate);
      particles.rotation.x += ((-tiltY * 0.5) - particles.rotation.x) * 0.05;
      particles.rotation.y += ((tiltX * 0.5) - particles.rotation.y) * 0.05;
      renderer.render(scene, camera);
    }
    animate();
  })();
</script>

<style>
  /* --- デザイン --- */
  .glass-header {
    position: fixed; top: 0; left: 0; width: 100%; height: 60px;
    background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(12px);
    border-bottom: 2px solid #F20789;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 30px; z-index: 1000; box-sizing: border-box;
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    color: #fff; font-family: 'Courier New', monospace;
  }
  .header-hidden { transform: translateY(-100%); }
  .left-group { display: flex; align-items: center; gap: 20px; }
  .site-title { color: #F20CE3; font-weight: bold; text-decoration: none; font-size: 20px; text-shadow: 0 0 8px #F20789; }
  .nav-items { display: flex; gap: 20px; align-items: center; }
  .nav-item { color: #fff; text-decoration: none; display: flex; align-items: center; gap: 8px; }
  .icon-btn, .user-btn { background: none; border: none; cursor: pointer; color: #fff; }
</style>

<header class="glass-header" id="site-header">
  <div class="left-group">
    <button id="menu-toggle" class="icon-btn">≡</button>
    <a class="site-title" href="/">efayukacoonar</a>
  </div>

  <nav class="nav-items">
    <div class="search-bar">
      <input type="text" placeholder="SEARCH..." style="background:rgba(255,255,255,0.1); border:1px solid #F20789; color:#fff; padding:5px; border-radius:4px;">
    </div>
    <a class="nav-item" href="#collections">Collection</a>
    <a class="nav-item" href="#games">Games</a>
    <button id="user-toggle" class="user-btn">👤</button>
  </nav>
</header>

<script>
  const header = document.getElementById('site-header');
  let lastScrollY = window.scrollY;

  window.addEventListener('scroll', () => {
    if (window.scrollY > lastScrollY && window.scrollY > 100) {
      header.classList.add('header-hidden');
    } else {
      header.classList.remove('header-hidden');
    }
    lastScrollY = window.scrollY;
  });
</script>
